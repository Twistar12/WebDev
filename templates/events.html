{% extends "base.html" %}

{% block title %}Events | Bristol Community Events{% endblock %}

{% block styles %}
  <style>
    .event-card {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-radius: 12px;
      color: #fff;
    }
    .event-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
    }
    .underline {
      position: relative;
      display: inline-block
    }
    .underline::before{
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 3px;
      background: white;
      border-radius: 2px;
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .event-card:hover .underline::before{ 
      transform: scaleX(1);
    }

    .event-card img {
      height: 220px;          /* consistent height for all */
      object-fit: cover;      /* crops edges to maintain aspect ratio */
      width: 100%;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px 8px 0 0;
    }

    /* Optionally, slightly smaller on mobile for better layout */
    @media (max-width: 576px) {
      .event-card img {
        height: 180px;
      }
    }

    .modal-content {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .book-btn {
      background: linear-gradient(135deg, #400177 15%, #1c003a 100%);
      color: white;
      text-decoration: none;
      border: 1px solid rgba(193, 2, 183, 0.385);
      box-shadow: 0 0 10px rgba(85, 4, 94, 0.651);
      transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .book-btn:hover {
      background: linear-gradient(90deg, #7209b7, #f72585);
      color: white;
      text-decoration: none;
      border:1px solid rgba(193, 2, 183, 0.385);
      box-shadow: 0 0 10px rgba(85, 4, 94, 0.651);
      font-weight: 600;
      transform: scale(1.02);
    }
  </style>
{% endblock %}

{% block content %}
  <section class="container py-5">
    <h1 class="text-center mb-4 style-script-regular" style="font-size: 3.5rem;">Upcoming Events</h1>
    <!-- Filters -->
    <div class="search-container p-4 rounded-3 shadow-lg mx-auto col-12 col-md-12 col-lg-12 w-100 mb-5">
      <form id="filterForm" class="row g-3 align-items-end">
        <div class="col-md-6 col-lg-3">
          <label for="venueFilter" class="form-label"><i class="fa-solid fa-location-dot me-2"></i>Venue</label>
          <select class="form-select" name="venue" id="venueFilter">
            <option value="">All Venues</option>
            {% for v in venues %}
              <option value="{{ v }}" {% if request.args.get('venue') == v %}selected{% endif %}>{{ v }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6 col-lg-3">
          <label for="priceFilter" class="form-label"><i class="fa-solid fa-sterling-sign me-2"></i>Price Range</label>
          <select class="form-select" name="price_range" id="priceFilter">
            <option value="">Any</option>
            <option value="free" {% if request.args.get('price_range') == 'free' %}selected{% endif %}>Free</option>
            <option value="low" {% if request.args.get('price_range') == 'low' %}selected{% endif %}>£0 - £20</option>
            <option value="mid" {% if request.args.get('price_range') == 'mid' %}selected{% endif %}>£20 - £50</option>
            <option value="high" {% if request.args.get('price_range') == 'high' %}selected{% endif %}>£50+</option>
          </select>
        </div>

        <div class="col-md-6 col-lg-3">
          <label for="dateFilter" class="form-label"><i class="fa-solid fa-calendar-days me-2"></i>Dates</label>
          <div class="input-group">
            <input type="date" name="start_date" class="form-control px-2" value="{{ request.args.get('start_date', '') }}" id="dateFilterStart">
            <span class="input-group-text px-2 bg-dark text-white border-secondary">to</span>
            <input type="date" name="end_date" class="form-control px-2" value="{{ request.args.get('end_date', '') }}" id="dateFilterEnd">
          </div>
        </div>

        <div class="col-md-6 col-lg-3">
          <label for="categoryFilter" class="form-label"><i class="fa fa-tags me-2"></i>Category</label>
          <select class="form-select" name="category" id="categoryFilter">
                <option value="">Any Category</option>
                {% for c in categories %}
                  <option value="{{ c }}" {% if request.args.get('category') == c %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
              </select> 
        </div>

        <div class="col-md-4 col-lg-3 mx-auto">
          <button type="button" class="btn btn-outline-light w-100 clear-btn" id="clearFilters">Clear Filters</button>
        </div>
      </form>
    </div>

    <!-- Events Grid -->
    <div class="row" id="eventsContainer">
      <!-- JavaScript injection of contents -->
    </div>

  </section>

  <!-- Event Modal -->
  <div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content p-4">
        <div class="modal-header border-0">
          <h5 class="modal-title" id="eventTitle">Event Modal</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- Event Image -->
           <img id="eventImage" src="#" alt="Event Image" class="img-fluid rounded-3 mb-3">
           <!-- Event Description -->
          <p id="eventDesc" class="mb-4"></p>

          <!-- Event Details-->
          <ul class="list-unstyled mt-3"> <!-- Bootstrap List Typography-->
            <li><strong>Date:</strong> <span id="eventDate"></span></li>
            <li><strong>Venue:</strong> <span id="eventVenue"></span></li>
            <li><strong>Price:</strong> £<span id="eventPrice"></span></li>
            <li><strong>Category:</strong> <span id="eventCategory"></span></li>
            <li><strong>Capacity:</strong> <span id="eventCapacity"></span></li>
            <li><strong>Available Slots:</strong> <span id="eventSlots"></span></li>
          </ul>
        </div>
        <div class="modal-footer border-0">
          <!-- Query for what event is selected inserted by JS -->
          <a href="#" class="btn book-btn w-100" id="bookNowBtn">Book Now</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const events = [
      { title: "Summer Jazz Night", date: "2025-06-20", venue: "Bristol Hippodrome", image:"bristol-hippodrome.png", price: 30, category: "Music", capacity: 200, slots: 50, desc: "An evening of smooth jazz performances by local artists." },
      { title: "Art Expo 2025", date: "2025-07-10", venue: "Arnolfini", price: 10, image:"Arnolfini.jpg", category: "Art", capacity: 300, slots: 120, desc: "Showcasing Bristol’s most creative visual artists." },
      { title: "Rock Festival", date: "2025-08-15", venue: "Ashton Gate Stadium", image:"ashton-gate.png", price: 75, category: "Sports", capacity: 5000, slots: 2000, desc: "A full-day outdoor rock music festival." },
      { title: "Community Food Fair", date: "2025-05-12", venue: "Bristol Beacon", image:"bristol-beacon.jpg", price: 0, category: "Food", capacity: 1000, slots: 450, desc: "Taste amazing food from around the community." },
      { title: "West Country Sports Expo", date: "2025-09-03", venue: "Ashton Gate Stadium", image: "ashton-gate.png", price: 25, category: "Sports", capacity: 150, slots: 130, desc: "An exhibition bringing together local sports clubs and athletes." },
      { title: "Contemporary Art Showcase", date: "2025-10-10", venue: "Royal West of England Academy", image: "bristol-oldvic.jpg", price: 12, category: "Art", capacity: 100, slots: 90, desc: "Modern art installations and sculptures from emerging artists." },
      { title: "Shakespeare in the City", date: "2025-06-05", venue: "Bristol Old Vic", image: "bristol-oldvic.jpg", price: 20, category: "Theatre", capacity: 110, slots: 95, desc: "A reimagined performance of Hamlet at the historic Old Vic." },
      { title: "Bristol Book Exhibition", date: "2025-09-21", venue: "Bristol Central Library", image: "bristol-beacon.jpg", price: 8, category: "Culture", capacity: 50, slots: 40, desc: "A literary exhibition celebrating Bristol’s reading community." },
      { title: "Photography for Beginners", date: "2025-11-12", venue: "Creative Space A", image: "Arnolfini.jpg", price: 15, category: "Workshop", capacity: 30, slots: 25, desc: "A hands-on photography workshop for beginners." },
      { title: "Ceramics Workshop", date: "2025-11-25", venue: "Creative Space B", image: "Arnolfini.jpg", price: 18, category: "Workshop", capacity: 50, slots: 40, desc: "Create your own ceramic pieces guided by local artisans." },
      { title: "UWE Business Conference", date: "2025-07-05", venue: "UWE Exhibition Centre", image: "bristol-beacon.jpg", price: 40, category: "Conference", capacity: 300, slots: 260, desc: "A professional networking conference for entrepreneurs and startups." },
      { title: "Wedding & Lifestyle Expo", date: "2025-08-02", venue: "UWE Exhibition Centre", image: "bristol-beacon.jpg", price: 0, category: "Exhibition", capacity: 300, slots: 200, desc: "Discover wedding planners, designers, and venues in one place." },
      { title: "Cultural Dance Night", date: "2025-09-18", venue: "Community Centre A", image: "bristol-hippodrome.png", price: 10, category: "Culture", capacity: 60, slots: 50, desc: "A celebration of global music and dance styles by Bristol communities." },
      { title: "Mindfulness & Meditation", date: "2025-10-05", venue: "Creative Space B", image: "Arnolfini.jpg", price: 12, category: "Workshop", capacity: 50, slots: 35, desc: "A calming guided meditation and wellness workshop." },
      { title: "Theatre Night: Phantom Echoes", date: "2025-12-10", venue: "Bristol Hippodrome", image: "bristol-hippodrome.png", price: 35, category: "Theatre", capacity: 120, slots: 100, desc: "A thrilling new stage performance blending mystery and music." }
    ];

    // Insert event cards in .container with #eventsContainer
    const container = document.getElementById("eventsContainer");

    function renderEvents(list) {
      container.innerHTML = "";

      // If no events found when filters applied, show message
      if (list.length === 0) {
        container.innerHTML = `
        <div class="col-12 text-center text-white py-5">
          <i class="fa-regular fa-face-sad-cry fa-shake fa-3x mb-3"></i>
          <h4>No Events Found</h4>
          <p class="text-light">Try adjusting your filters or check back later for more events!</p>
        </div>`;
        return;
      }

      // For loop using forEach()
      list.forEach(ev => {                   
        const card = document.createElement("div"); // Start to create cards in this container
        card.className = "col-md-6 col-lg-4 mb-4";
        // `...` for multi-line strings
        card.innerHTML = `    
          <div class="event-card card h-100 d-flex flex-column justify-content-between">
            <img src="../static/img/${ev.image}" class="card-img-top rounded-1" alt="${ev.title}" loading="lazy" style="max-height: 199px; object-fit: cover;">
            <div class="card-body p-4">
              <h4 class="underline">${ev.title}</h4>
              <p class="mb-1"><i class="fa fa-calendar me-2"></i>${ev.date}</p> 
              <p class="mb-1"><i class="fa fa-location-dot me-2"></i>${ev.venue}</p>
              <p class="mb-1"><i class="fa fa-ticket me-2"></i>£${ev.price}</p>
              <p class="mb-1"><i class="fa fa-tags me-2"></i>${ev.category}</p>
              <small>Capacity: ${ev.capacity} | Available Slots: ${ev.slots}</small>
              <p class="mt-2">${ev.desc}</p>
            </div>
            <button class="btn btn-outline-light m-2" data-bs-toggle="modal" data-bs-target="#eventModal" onclick='openEvent(${JSON.stringify(ev)})'>View More</button> <!-- Convert to JS String -->
          </div>`;
        container.appendChild(card);
      });
    }

    // Populate the modal
    function openEvent(ev) {
      document.getElementById("eventTitle").textContent = ev.title;
      document.getElementById("eventDate").textContent = ev.date;
      document.getElementById("eventVenue").textContent = ev.venue;
      document.getElementById("eventPrice").textContent = ev.price;
      document.getElementById("eventCategory").textContent = ev.category
      document.getElementById("eventCapacity").textContent = ev.capacity;
      document.getElementById("eventSlots").textContent = ev.slots;
      document.getElementById("eventDesc").textContent = ev.desc;

      // Add event image
      const img = document.getElementById("eventImage");
      img.src = `../files/${ev.image}`;
      img.alt = ev.title;

      // Book Now button
      const bookNowBtn = document.getElementById("bookNowBtn");
      bookNowBtn.href = `booking.html?event=${encodeURIComponent(ev.title)}`; // Change title to a safe URL to execute
    }

    function filterEvents() {
      const venue = document.getElementById("venueFilter").value;
      const price = document.getElementById("priceFilter").value;
      const date = document.getElementById("dateFilter").value;
      const category = document.getElementById("categoryFilter").value;
      let filtered = events;

      if (venue) filtered = filtered.filter(e => e.venue === venue); // Check for filters applied and add only those satisfying the filter in 'filtered'
      if (price) {
        if (price === "free") filtered = filtered.filter(e => e.price === 0); // Filter events with price value = 0
        else if (price === "low") filtered = filtered.filter(e => e.price <= 20 && e.price > 0); // Filter events with price value <=20 and > 0
        else if (price === "mid") filtered = filtered.filter(e => e.price > 20 && e.price <= 50); // Filter events with price value > 20 and <= 50
        else if (price === "high") filtered = filtered.filter(e => e.price > 50); // Filter events with price > 50
      }
      if (date) filtered = filtered.filter(e => e.date === date); // Filter events based on the date provided
      if (category) filtered = filtered.filter(e => e.category === category); // Filter events that satisfy the category

      renderEvents(filtered); // Render all events populated in 'filtered' that satisfy the following filters
    }

    // Add event listener to listen for a value change in the respective ids and apply filterEvents function
    document.getElementById("venueFilter").addEventListener("change", filterEvents); 
    document.getElementById("priceFilter").addEventListener("change", filterEvents);
    document.getElementById("dateFilter").addEventListener("change", filterEvents);
    document.getElementById("categoryFilter").addEventListener("change", filterEvents);
    document.getElementById("clearFilters").addEventListener("click", () => { // Clear filters button
      document.getElementById("filterForm").reset(); 
      renderEvents(events); // After clearing, render events again this time with no filters applied
    });

    renderEvents(events); // Display filtered events
  </script>
</body>
</html>
