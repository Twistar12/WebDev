{% extends "base.html" %}

{% block title %}Events | Bristol Community Events{% endblock %}

{% block styles %}
  <style>
    .event-card {
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border-radius: 12px;
      color: #fff;
    }
    .event-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 20px rgba(255, 255, 255, 0.2);
    }
    .underline {
      position: relative;
      display: inline-block
    }
    .underline::before{
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 3px;
      background: white;
      border-radius: 2px;
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .event-card:hover .underline::before{ 
      transform: scaleX(1);
    }

    .event-card img {
      height: 220px;          /* consistent height for all */
      object-fit: cover;      /* crops edges to maintain aspect ratio */
      width: 100%;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px 8px 0 0;
    }

    /* Optionally, slightly smaller on mobile for better layout */
    @media (max-width: 576px) {
      .event-card img {
        height: 180px;
      }
    }

    .modal-content {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .book-btn {
      background: linear-gradient(135deg, #400177 15%, #1c003a 100%);
      color: white;
      text-decoration: none;
      border: 1px solid rgba(193, 2, 183, 0.385);
      box-shadow: 0 0 10px rgba(85, 4, 94, 0.651);
      transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  color 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .book-btn:hover {
      background: linear-gradient(90deg, #7209b7, #f72585);
      color: white;
      text-decoration: none;
      border:1px solid rgba(193, 2, 183, 0.385);
      box-shadow: 0 0 10px rgba(85, 4, 94, 0.651);
      font-weight: 600;
      transform: scale(1.02);
    }
    
    /* Box to enclose the slider - mimics Bootstrap form fields */
    .slider-box {
      display: flex;
      align-items: center;
      height: 38px; /* Standard Bootstrap form height */
      padding: 0 12px;
      background-color: #fff; /* Match your other fields' background */
      border: 1px solid #ced4da; /* Standard Bootstrap border */
      border-radius: 0.25rem;
      width: 100%;
    }

    /* Container for the range inputs inside the box */
    .price-input-container {
      width: 100%;
      position: relative;
      height: 5px; /* Height of the track */
    }

    .price-input-container input[type="range"] {
      position: absolute;
      width: 100%;
      height: 5px;
      top: 0;
      background: none;
      pointer-events: none;
      -webkit-appearance: none;
      appearance: none;
    }

    /* Styling the handles (thumbs) */
    input[type="range"]::-webkit-slider-thumb {
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #7209b7; 
      pointer-events: auto;
      -webkit-appearance: none;
      cursor: pointer;
      border: 2px solid #fff;
    }

    input[type="range"]::-moz-range-thumb {
      height: 16px;
      width: 16px;
      border-radius: 50%;
      background: #7209b7;
      pointer-events: auto;
      cursor: pointer;
      border: 2px solid #fff;
    }

    /* The visual track line */
    .slider-track {
      width: 100%;
      height: 5px;
      position: absolute;
      top: 0;
      background-color: #dee2e6; /* Light grey track */
      border-radius: 5px;
    }
  </style>
{% endblock %}

{% block content %}
<!-- Hidden script to pass events data from Flask to JavaScript -->
<script id="events-data-bridge" type="application/json">
  {{ events | tojson | safe }}
</script> 

<section class="container py-5">
  <h1 class="text-center mb-4 style-script-regular" style="font-size: 3.5rem;">Upcoming Events</h1>
  <!-- Filters -->
  <div class="search-container p-4 rounded-3 shadow-lg mx-auto col-12 col-md-12 col-lg-12 w-100 mb-5">
    <form id="filterForm" class="row g-3 align-items-end">
      <div class="col-md-6 col-lg-3">
        <label for="venueFilter" class="form-label"><i class="fa-solid fa-location-dot me-2"></i>Venue</label>
        <select class="form-select" name="venue" id="venueFilter">
          <option value="">All Venues</option>
          {% for v in venues %}
            <option value="{{ v }}" {% if request.args.get('venue') == v %}selected{% endif %}>{{ v }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="col-md-6 col-lg-3">
          <label class="form-label d-flex justify-content-between">
            <span><i class="fa-solid fa-sterling-sign me-2"></i>Price Range</span>
            <span id="priceLabel" class="fw-bold">£0 - £50</span>
          </label>
          <div class="slider-box">
            <div class="price-input-container">
              <div class="slider-track" id="track"></div>
              <input type="range" id="minPrice" min="0" max="50" value="0" step="5">
              <input type="range" id="maxPrice" min="0" max="50" value="50" step="5">
            </div>
          </div>
        </div>

      <div class="col-md-6 col-lg-3">
        <label for="dateFilter" class="form-label"><i class="fa-solid fa-calendar-days me-2"></i>Dates</label>
        <div class="input-group">
          <input type="date" name="start_date" class="form-control px-2" value="{{ request.args.get('date', '') }}" id="dateFilterStart">
          <span class="input-group-text px-2 text-dark border-secondary">to</span>
          <input type="date" name="end_date" class="form-control px-2" value="{{ request.args.get('end_date', '') }}" id="dateFilterEnd">
        </div>
      </div>

      <div class="col-md-6 col-lg-3">
        <label for="categoryFilter" class="form-label"><i class="fa fa-tags me-2"></i>Category</label>
        <select class="form-select" name="category" id="categoryFilter">
              <option value="">Any Category</option>
              {% for c in categories %}
                <option value="{{ c }}" {% if request.args.get('category') == c %}selected{% endif %}>{{ c }}</option>
              {% endfor %}
            </select> 
      </div>

      <div class="col-md-4 col-lg-3 mx-auto">
        <button type="button" class="btn btn-outline-light w-100 clear-btn" id="clearFilters">Clear Filters</button>
      </div>
    </form>
  </div>

  <!-- Events Grid -->
  <div class="row" id="eventsContainer">
    <!-- JavaScript injection of contents -->
  </div>
</section>

  <!-- Event Modal -->
  <div class="modal fade" id="eventModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content p-4">
        <div class="modal-header border-0">
          <h5 class="modal-title" id="eventTitle">Event Modal</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <!-- Event Image -->
           <img id="eventImage" src="#" alt="Event Image" class="img-fluid rounded-3 mb-3">
           <!-- Event Description -->
          <p id="eventDesc" class="mb-4"></p>

          <!-- Event Details-->
          <ul class="list-unstyled mt-3"> <!-- Bootstrap List Typography-->
            <li><strong>Date:</strong> <span id="eventDate"></span></li>
            <li><strong>Venue:</strong> <span id="eventVenue"></span></li>
            <li><strong>Price:</strong> £<span id="eventPrice"></span></li>
            <li><strong>Category:</strong> <span id="eventCategory"></span></li>
            <li><strong>Capacity:</strong> <span id="eventCapacity"></span></li>
            <li><strong>Available Slots:</strong> <span id="eventSlots"></span></li>
          </ul>
        </div>
        <div class="modal-footer border-0">
          <!-- Query for what event is selected inserted by JS -->
          <a href="#" class="btn book-btn w-100" id="bookNowBtn">Book Now</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script>
    // take string from hidden div and convert to JS object 
    // Prevent XSS by using Flask's tojson filter and safe to ensure it's properly escaped and parsed as JSON
    const dataBridgeText = document.getElementById('events-data-bridge').textContent;
    const fetchedEvents = JSON.parse(dataBridgeText);

    const staticImgPath = "{{ url_for('static', filename='img/event_cards/') }}";

    // Move modal to body to prevent stacking context issues (dark unclickable screen)
    document.body.appendChild(document.getElementById("eventModal"));

    // Insert event cards in .container with #eventsContainer
    const container = document.getElementById("eventsContainer");

    // Slider logic
    const minSlider = document.getElementById("minPrice");
    const maxSlider = document.getElementById("maxPrice");
    const track = document.getElementById("track");

    function updateTrack() {
      const min = parseInt(minSlider.value);
      const max = parseInt(maxSlider.value);

      // Calculate percentage positions for the track fill
      const percent1 = (min / minSlider.max) * 100;
      const percent2 = (max / maxSlider.max) * 100; 

      // Update the track background using a linear gradient
      track.style.background = `linear-gradient(to right, #dee2e6 ${percent1}%, #FC5637 ${percent1}%, #FC5637 ${percent2}%, #dee2e6 ${percent2}%)`;
    }

    function renderEvents(list) {
      container.innerHTML = "";

      // If no events found when filters applied, show message
      if (list.length === 0) {
        container.innerHTML = `
        <div class="col-12 text-center text-white py-5">
          <i class="fa-regular fa-face-sad-cry fa-shake fa-3x mb-3"></i>
          <h4>No Events Found</h4>
          <p class="text-light">Try adjusting your filters or check back later for more events!</p>
        </div>`;
        return;
      }

      // For loop using forEach()
      list.forEach(ev => {                   
        const card = document.createElement("div"); // Start to create cards in this container
        card.className = "col-md-6 col-lg-4 mb-4";

        // format multi-day dates for cards
        let displayDate = ev.date;
        if (ev.end_date && ev.end_date !== ev.date) {
          displayDate += ` to ${ev.end_date}`;
        }

        // sold out status for UI
        const slotDisplay = ev.slots === 0 ? `<span class="text-danger fw-bold">SOLD OUT</span>` : `${ev.slots} left`;

        // `...` for multi-line strings
        card.innerHTML = `    
          <div class="event-card card h-100 d-flex flex-column justify-content-between">
            <img src="${staticImgPath}${ev.image}" class="card-img-top rounded-1" alt="${ev.title}" loading="lazy" style="max-height: 199px; object-fit: cover;">
            <div class="card-body p-4">
              <h4 class="underline">${ev.title}</h4>
              <p class="mb-1"><i class="fa fa-calendar me-2"></i>${displayDate}</p> 
              <p class="mb-1"><i class="fa fa-location-dot me-2"></i>${ev.venue}</p>
              <p class="mb-1"><i class="fa fa-ticket me-2"></i>£${ev.price}</p>
              <p class="mb-1"><i class="fa fa-tags me-2"></i>${ev.category}</p>
              <small>Capacity: ${ev.capacity} | Available Slots: ${slotDisplay}</small>
              <p class="mt-2">${ev.desc.substring(0, 70)}...</p>
            </div>
            <button class="btn btn-outline-light m-2" data-bs-toggle="modal" data-bs-target="#eventModal" onclick="openEvent(${fetchedEvents.indexOf(ev)})">View More</button> <!-- Pass JS Index instead of object -->
          </div>`;
        container.appendChild(card);
      });
    }

    // Populate the modal
    function openEvent(eventIndex) {
      const ev = fetchedEvents[eventIndex];
      document.getElementById("eventTitle").textContent = ev.title;

      let displayDate = ev.date;
      if (ev.end_date && ev.end_date !== ev.date) {
        displayDate += ` to ${ev.end_date}`;
      }
      document.getElementById("eventDate").textContent = displayDate;

      document.getElementById("eventVenue").textContent = ev.venue;
      document.getElementById("eventPrice").textContent = ev.price;
      document.getElementById("eventCategory").textContent = ev.category;
      document.getElementById("eventCapacity").textContent = ev.capacity;
      document.getElementById("eventSlots").textContent = ev.slots === 0 ? "SOLD OUT" : ev.slots; // Show sold out if slots = 0
      document.getElementById("eventDesc").textContent = ev.desc;

      // Add event image
      const img = document.getElementById("eventImage");
      img.src = `${staticImgPath}${ev.image}`;
      img.alt = ev.title;

      // Book Now button
      const bookNowBtn = document.getElementById("bookNowBtn");
      if (ev.slots === 0) {
        bookNowBtn.classList.add("disabled", "btn-secondary", "border-secondary");
        bookNowBtn.textContent = "Sold Out";
        bookNowBtn.href = "#";
      } else {
        bookNowBtn.classList.remove("disabled", "btn-secondary", "border-secondary");
        bookNowBtn.textContent = "Book Now";
        // bookNowBtn.classList.add("book-btn");
        bookNowBtn.href = `booking.html?event=${encodeURIComponent(ev.title)}`; // Safe URL encoding for event title in query string
      }
    }

    function filterEvents() {
      const venue = document.getElementById("venueFilter").value;
      const startDate = document.getElementById("dateFilterStart").value;
      const endDate = document.getElementById("dateFilterEnd").value;
      const category = document.getElementById("categoryFilter").value;

      let minPrice = parseInt(document.getElementById("minPrice").value);
      let maxPrice = parseInt(document.getElementById("maxPrice").value);

      if (minPrice > maxPrice) { // If sliders cross, swap values and update labels
        [minPrice, maxPrice] = [maxPrice, minPrice];
        document.getElementById("minPrice").value = minPrice;
        document.getElementById("maxPrice").value = maxPrice;
      }

      updateTrack();
      // Update label text
      document.getElementById("priceLabel").textContent = `£${minPrice} - £${maxPrice}`;

      let filtered = fetchedEvents;

      if (venue) filtered = filtered.filter(e => e.venue === venue); // Check for filters applied and add only those satisfying the filter in 'filtered'
      if (category) filtered = filtered.filter(e => e.category === category); // Filter events that satisfy the category

      filtered = filtered.filter(e => {
        const p = parseFloat(e.price.replace('£', '')); // Remove £ sign and parse price as float for comparison
        return p >= minPrice && p <= maxPrice; // Check if event price is within selected range
      });

      if (startDate && endDate) {
        filtered = filtered.filter(e => {
          const eventStart = new Date(e.date);
          const eventEnd = e.end_date ? new Date(e.end_date) : eventStart; // If no end date, use start date
          return (eventStart >= new Date(startDate) && eventStart <= new Date(endDate)) ||
                 (eventEnd >= new Date(startDate) && eventEnd <= new Date(endDate)) ||
                 (eventStart <= new Date(startDate) && eventEnd >= new Date(endDate)); // Check if event overlaps with filter range
        });
      }

      renderEvents(filtered); // Render all events populated in 'filtered' that satisfy the following filters
    }

    // Listen for slider input change
    minSlider.addEventListener("input", filterEvents);
    maxSlider.addEventListener("input", filterEvents);
    updateTrack(); // Initialize track on page load

    // Add event listener to listen for a value change in the respective ids and apply filterEvents function
    document.getElementById("venueFilter").addEventListener("change", filterEvents); 
    // document.getElementById("priceFilter").addEventListener("change", filterEvents);
    document.getElementById("dateFilterStart").addEventListener("change", filterEvents);
    document.getElementById("dateFilterEnd").addEventListener("change", filterEvents);
    document.getElementById("categoryFilter").addEventListener("change", filterEvents);

    document.getElementById("clearFilters").addEventListener("click", () => { // Clear filters button
      document.getElementById("filterForm").reset(); 
      document.getElementById("minPrice").value = 0; // Reset price sliders to default
      document.getElementById("maxPrice").value = 50;
      document.getElementById("priceLabel").textContent = "£0 - £50"; // Reset price label
      renderEvents(fetchedEvents); // After clearing, render events again this time with no filters applied
    });

    renderEvents(fetchedEvents); // Display filtered fetchedEvents
  </script>
{% endblock %}
